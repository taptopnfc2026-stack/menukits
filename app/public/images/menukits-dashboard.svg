        <rect x="0" y="0" width="116" height="24" rx="4" fill="#f8f9fb"/>
        <text x="6" y="9" font-family="Arial, sans-serif" font-weight="600" font-size="6" fill="#1a1520">Burrata Bruschetta</text>
        <text x="6" y="18" font-family="Arial, sans-serif" font-weight="500" font-size="5" fill="#9da3ad">Tomato, basil, olive o...</text>
        <text x="82" y="9" font-family="Arial, sans-serif" font-weight="700" font-size="6" fill="#1a1520">€8.90</text>
      </g>

      <g transform="translate(42, 198)">
        <rect x="0" y="0" width="116" height="24" rx="4" fill="white"/>
        <text x="6" y="9" font-family="Arial, sans-serif" font-weight="600" font-size="6" fill="#1a1520">Truffle Arancini</text>
        <text x="6" y="18" font-family="Arial, sans-serif" font-weight="500" font-size="5" fill="#9da3ad">Mushroom, parmesan, ...</text>
        <text x="82" y="9" font-family="Arial, sans-serif" font-weight="700" font-size="6" fill="#1a1520">€9.50</text>
      </g>

      <g transform="translate(42, 226)">
