        <text x="6" y="9" font-family="Arial, sans-serif" font-weight="600" font-size="6" fill="#1a1520">Beef Carpaccio</text>
        <text x="6" y="18" font-family="Arial, sans-serif" font-weight="500" font-size="5" fill="#9da3ad">Arugula, parmesan, le...</text>
        <text x="82" y="9" font-family="Arial, sans-serif" font-weight="700" font-size="6" fill="#5544e4">€10.50</text>
      </g>

      <text x="42" y="268" font-family="Arial, sans-serif" font-weight="600" font-size="8" fill="#7b7f88">SALADS</text>

