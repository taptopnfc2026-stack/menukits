<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#f0f2f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5544e4"/>
      <stop offset="100%" stop-color="#7c6ff7"/>
    </linearGradient>
    <linearGradient id="previewGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#0d0b12"/>
    </linearGradient>
    <linearGradient id="sidebar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#eef0f4"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f9fafb"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1a1520" flood-opacity="0.06"/>
    </filter>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#1a1520" flood-opacity="0.05"/>
    </filter>
    <clipPath id="frameClip">
      <rect x="0" y="0" width="1024" height="640" rx="16"/>
    </clipPath>
  </defs>

  <!-- Frame -->
  <rect x="0" y="0" width="1024" height="640" rx="16" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="640" rx="16" stroke="#dde0e5" stroke-width="1.5"/>

  <g clip-path="url(#frameClip)">

    <!-- ===== TOP HEADER ===== -->
    <rect x="0" y="0" width="1024" height="52" fill="white" opacity="0.95"/>
    <line x1="0" y1="52" x2="1024" y2="52" stroke="#eef0f4" stroke-width="1"/>

    <!-- Logo -->
    <g transform="translate(16, 10)">
      <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#accent)"/>
      <text x="16" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="white">M</text>
    </g>
    <text x="56" y="32" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#1a1520">
      menu<tspan fill="#5544e4">kits</tspan>
    </text>

    <!-- Header right actions -->
    <g transform="translate(830, 12)">
