      <text x="40" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="white">Publish</text>
    </g>
    <circle cx="940" cy="26" r="14" fill="#eef0f4"/>
    <text x="940" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="13" fill="#7b7f88">A</text>

    <!-- ===== SIDEBAR ===== -->
