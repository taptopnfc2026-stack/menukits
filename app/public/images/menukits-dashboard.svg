    <text x="262" y="72" font-family="Arial, sans-serif" font-weight="500" font-size="11" fill="#9da3ad">/</text>
    <text x="270" y="72" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#5544e4">Dinner Menu</text>

